name: Keep Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node index.js
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
